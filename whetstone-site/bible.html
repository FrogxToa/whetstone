const { useState, useMemo, useEffect } = React;

// localStorage hook — works on whetstone.guide, silently falls back in preview
function useLS(key, def) {
  const [s, sS] = useState(() => {
    try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; }
    catch { return def; }
  });
  const set = v => {
    sS(typeof v === 'function' ? prev => { const nv = v(prev); try { localStorage.setItem(key, JSON.stringify(nv)); } catch {} return nv; } : v);
    if (typeof v !== 'function') { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }
  };
  return [s, set];
}

function exportPresets() {
  try {
    const keys = ['ws-homeland','ws-lv-cur','ws-lv-tgt','ws-lv-exp','ws-lv-eph','ws-orb-type','ws-orb-lv','ws-wing-tier','ws-wing-from','ws-wing-to','ws-stig-tier','ws-stig-from'];
    const data = { version:1, saved:new Date().toISOString(), presets:{} };
    keys.forEach(k => { try { const v=localStorage.getItem(k); if(v!==null) data.presets[k]=JSON.parse(v); } catch {} });
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='whetstone-presets.json'; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('Export requires a real browser environment (not Claude preview).'); }
}

function importPresets(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.presets) {
        Object.entries(data.presets).forEach(([k,v]) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} });
        window.location.reload();
      }
    } catch { alert('Invalid preset file.'); }
  };
  r.readAsText(file);
}

// ─── LEVELLING CALCULATOR ────────────────────────────────────────────────────
function LevellingCalc(){
  const [curLv,setCurLv]=useLS('ws-lv-cur',120);
  const [curExp,setCurExp]=useLS('ws-lv-exp',0);
  const [expHr,setExpHr]=useLS('ws-lv-eph',20000);
  const [tgtLv,setTgtLv]=useLS('ws-lv-tgt',140);

  const result=useMemo(()=>{
    const cl=Math.max(MIN_LV,Math.min(MAX_LV-1,parseInt(curLv)||116));
    const tl=Math.max(cl+1,Math.min(MAX_LV,parseInt(tgtLv)||cl+1));
    const ce=Math.max(0,parseInt(curExp)||0);
    const eh=Math.max(1,parseInt(expHr)||1);
    const base=EXP_MAP[cl]??0;
    const target=EXP_MAP[tl]??0;
    const remaining=Math.max(0,target-(base+ce));
    const hrs=remaining/eh;
    const h=Math.floor(hrs);
    const m=Math.round((hrs-h)*60);
    const now=new Date();
    now.setHours(now.getHours()+h);
    now.setMinutes(now.getMinutes()+m);
    const lvExpNeeded=EXP_MAP[cl+1]?EXP_MAP[cl+1]-base:0;
    const pct=lvExpNeeded>0?Math.min(100,Math.round((ce/lvExpNeeded)*100)):0;
    return{remaining,h,m,hrs,eta:now.toLocaleString(),pct,lvExpNeeded};
  },[curLv,curExp,expHr,tgtLv]);

  const lvOptions=EXP_TABLE.slice(0,-1).map(([l])=>({value:l,label:`Level ${l}`}));
  const tgtOptions=EXP_TABLE.filter(([l])=>l>(parseInt(curLv)||116)).map(([l])=>({value:l,label:`Level ${l}`}));

  return(
    <div>
      <H1>Levelling <em>Calculator</em></H1>
      <p style={{color:C.soft,fontSize:14,marginBottom:24}}>EXP table covers levels 116–242 from the Bible. Input your stats and see exactly how long until you hit your target.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Sel label="Current Level" value={curLv} onChange={e=>setCurLv(e.target.value)} options={lvOptions}/>
        <Sel label="Target Level" value={tgtLv} onChange={e=>setTgtLv(e.target.value)} options={[...EXP_TABLE.filter(([l])=>l>(parseInt(curLv)||116)).map(([l])=>({value:l,label:`Level ${l}`}))]}/>
        <Inp label="Current EXP in this level" value={curExp} onChange={e=>setCurExp(e.target.value)} min={0} max={result.lvExpNeeded} step={1000}/>
        <Inp label="EXP per hour" value={expHr} onChange={e=>setExpHr(e.target.value)} min={1} step={1000}/>
      </div>
      <div style={{background:C.sur2,border:`1px solid ${C.border}`,padding:"12px 16px",marginBottom:16}}>
        <div style={{...mono,fontSize:10,color:C.muted,marginBottom:6,letterSpacing:"0.12em",textTransform:"uppercase"}}>Current level progress</div>
        <div style={{background:C.border,height:8,borderRadius:0}}>
          <div style={{background:C.amber,height:"100%",width:`${result.pct}%`,transition:"width 0.3s"}}/>
        </div>
        <div style={{...mono,fontSize:11,color:C.soft,marginTop:4}}>{result.pct}% — {(parseInt(curExp)||0).toLocaleString()} / {result.lvExpNeeded.toLocaleString()} EXP</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <ResultBox label="EXP remaining" value={result.remaining.toLocaleString()} sub={`to reach Level ${tgtLv}`}/>
        <ResultBox label="Time required" value={`${result.h}h ${result.m}m`} sub={result.hrs<1?"Less than 1 hour":"At current EXP/hr"} color={C.teal}/>
      </div>
      <ResultBox label="Estimated arrival" value={result.eta} sub="Based on current time + hours remaining" color={C.violet}/>
    </div>
  );
}

// ─── SOUL ORB CALCULATOR ─────────────────────────────────────────────────────
function SoulOrbCalc(){
  const [type,setType]=useLS('ws-orb-type',"Red");
  const [curLv,setCurLv]=useLS('ws-orb-lv',0);
  const orb=SOUL_ORB[type];

  const result=useMemo(()=>{
    const lv=parseInt(curLv)||0;
    let frags=lv===0?orb.unlock:0;
    let bt=0;
    orb.levels.forEach(e=>{
      if(e.bt!==undefined){if(e.lv===undefined)bt+=e.cost}
      else if(e.lv>lv)frags+=(e.frags??0);
    });
    // Add breakthrough costs after current level
    let passedBt=0;
    orb.levels.forEach(e=>{
      if(e.bt!==undefined){
        const prevLvs=orb.levels.filter(x=>x.lv!==undefined&&x.lv<(e.bt*3));
        const maxLvBefore=Math.max(0,...prevLvs.map(x=>x.lv));
        if(lv<maxLvBefore)frags+=e.cost;
      }
    });
    return{frags:Math.max(0,frags),total:orb.total};
  },[type,curLv,orb]);

  const rows=[];
  let cum=orb.unlock;
  rows.push(["Unlock","-",orb.unlock,orb.unlock]);
  orb.levels.forEach(e=>{
    if(e.bt!==undefined){cum+=e.cost;rows.push([`Breakthrough ${e.bt}`,"-",e.cost,cum]);}
    else{cum+=e.frags;rows.push([`Level ${e.lv}`,e.lv,e.frags,cum]);}
  });

  return(
    <div>
      <H1>Soul Orb <em>Fragment Calculator</em></H1>
      <p style={{color:C.soft,fontSize:14,marginBottom:20}}>Red orb total: 1,386 frags · Orange orb total: 1,220 frags · Ephenia:Balrog ratio at level 117 is ~1.15:1</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
        <Sel label="Orb type" value={type} onChange={e=>setType(e.target.value)} options={["Red","Orange"]}/>
        <Sel label="Current level (0 = not unlocked)" value={curLv} onChange={e=>setCurLv(e.target.value)} options={[{value:0,label:"Not unlocked"},...Array.from({length:10},(_,i)=>({value:i+1,label:`Level ${i+1}`}))]}/>
      </div>
      <ResultBox label="Fragments remaining to max" value={result.frags.toLocaleString()} sub={`${type} orb · max requires ${result.total.toLocaleString()} total from zero`}/>
      <Divider/>
      <Label>Full breakdown ({type} orb)</Label>
      <Table heads={["Step","Level","Frags","Cumulative"]} rows={rows}/>
    </div>
  );
}

// ─── WINGS CALCULATOR ────────────────────────────────────────────────────────
function WingsCalc(){
  const [tier,setTier]=useLS('ws-wing-tier',"Blue");
  const [from,setFrom]=useLS('ws-wing-from',0);
  const [to,setTo]=useLS('ws-wing-to',1);
  const data=WINGS[tier];

  const result=useMemo(()=>{
    const f=Math.max(0,Math.min(data.max-1,parseInt(from)||0));
    const t=Math.max(f+1,Math.min(data.max,parseInt(to)||f+1));
    let frags=0,dusty=0,silent=0,twinkling=0,sparkling=0,burning=0;
    data.levels.slice(f,t).forEach(l=>{
      frags+=l.frags||0;dusty+=l.dusty||0;silent+=l.silent||0;
      twinkling+=l.twinkling||0;sparkling+=l.sparkling||0;burning+=l.burning||0;
    });
    return{frags,dusty,silent,twinkling,sparkling,burning};
  },[tier,from,to,data]);

  const fromOpts=Array.from({length:data.max},(_,i)=>({value:i,label:i===0?"Not upgraded":`+${i}`}));
  const toOpts=Array.from({length:data.max-(parseInt(from)||0)},(_,i)=>({value:(parseInt(from)||0)+i+1,label:`+${(parseInt(from)||0)+i+1}`}));

  const tbl=[];let cum=0;
  data.levels.forEach((l,i)=>{cum+=l.frags;const t={dusty:l.dusty,silent:l.silent,twinkling:l.twinkling,sparkling:l.sparkling,burning:l.burning};const tstr=Object.entries(t).filter(([,v])=>v).map(([k,v])=>`${v}× ${k.charAt(0).toUpperCase()+k.slice(1)}`).join(", ");tbl.push([`+${i+1}`,l.frags,tstr,cum]);});

  return(
    <div>
      <H1>Wings <em>Calculator</em></H1>
      <p style={{color:C.soft,fontSize:14,marginBottom:20}}>Select wing tier and upgrade range. Shows fragment cost and tinder required by type.</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
        <Sel label="Wing tier" value={tier} onChange={e=>{setTier(e.target.value);setFrom(0);setTo(1);}} options={["Blue","Purple","Yellow","Orange"]}/>
        <Sel label="From level" value={from} onChange={e=>setFrom(e.target.value)} options={fromOpts}/>
        <Sel label="To level" value={to} onChange={e=>setTo(e.target.value)} options={toOpts}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <ResultBox label="Wing fragments needed" value={result.frags.toLocaleString()}/>
        {result.dusty>0&&<ResultBox label="Dusty Tinder" value={result.dusty.toLocaleString()} color={C.soft}/>}
        {result.silent>0&&<ResultBox label="Silent Tinder" value={result.silent.toLocaleString()} color={C.teal}/>}
        {result.twinkling>0&&<ResultBox label="Twinkling Tinder" value={result.twinkling.toLocaleString()} color={C.violet}/>}
        {result.sparkling>0&&<ResultBox label="Sparkling Tinder" value={result.sparkling.toLocaleString()} color={C.amber}/>}
        {result.burning>0&&<ResultBox label="Burning Tinder" value={result.burning.toLocaleString()} color={C.red}/>}
      </div>
      <Divider/>
      <Label>Full {tier} wing cost table</Label>
      <Table heads={["Level","Frags","Tinder Required","Cumulative Frags"]} rows={tbl}/>
    </div>
  );
}
